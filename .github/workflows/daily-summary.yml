name: Daily portfolio summary

on:
  schedule:
    # Once daily, deliberately offset from the start of the hour.
    - cron: "17 8 * * *"
  workflow_dispatch:

concurrency:
  group: dividend-monitor
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  daily-summary:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: python -m pip install --upgrade pip && python -m pip install -e ".[dev]"

      - name: Send daily summary
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python -m dividend_monitor.daily_summary

      - name: Check state changes
        id: state
        shell: bash
        run: |
          if git diff --quiet -- data/state.json; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit updated state
        if: steps.state.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/state.json
          git commit -m "chore: mark daily summary as sent"
          git push
