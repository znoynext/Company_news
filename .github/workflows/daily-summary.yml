name: Daily portfolio summary

on:
  schedule:
    # Once daily, deliberately offset from the start of the hour.
    - cron: "17 8 * * *"
  workflow_dispatch:

concurrency:
  group: dividend-monitor
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  daily-summary:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --requirement requirements-runtime.lock
          python -m pip install --no-deps --no-build-isolation -e .

      - name: Send daily summary
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        shell: bash
        run: |
          set -o pipefail
          python -m dividend_monitor.daily_summary 2>&1 | tee daily-summary-output.txt

      - name: Check state changes
        id: state
        shell: bash
        run: |
          if git diff --quiet -- data/state.json; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit updated state
        if: steps.state.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/state.json
          git commit -m "chore: mark daily summary as sent"
          git push

      - name: Print run metrics
        if: always()
        run: |
          if [ -f daily-summary-output.txt ]; then
            grep -E '^(Duration|Sources|New publications|Telegram messages|Errors):' daily-summary-output.txt || true
          fi
