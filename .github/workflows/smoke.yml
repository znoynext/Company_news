name: Weekly source smoke test

on:
  schedule:
    - cron: "23 9 * * 1"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install runtime dependencies
        run: |
          python -m pip install --requirement requirements-runtime.lock
          python -m pip install --no-deps --no-build-isolation -e .
      - name: Fetch and validate sources without delivery
        env:
          DRY_RUN: "true"
          AI_ENABLED: "false"
        run: python -m dividend_monitor.runner --dry-run
