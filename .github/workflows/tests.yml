name: Tests

on:
  push:
    paths:
      - "src/**"
      - "tests/**"
      - "config/**"
      - "pyproject.toml"
      - "requirements-*.lock"
      - ".github/workflows/**"
  pull_request:
    paths:
      - "src/**"
      - "tests/**"
      - "config/**"
      - "pyproject.toml"
      - "requirements-*.lock"
      - ".github/workflows/**"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --requirement requirements-dev.lock
          python -m pip install --no-deps --no-build-isolation -e .

      - name: Run pytest
        run: python -m pytest

      - name: Run Ruff
        run: ruff check .
