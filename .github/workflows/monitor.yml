name: Dividend monitor

on:
  schedule:
    # Every two hours from 08:00 through 22:00 Moscow time (UTC+3).
    - cron: "7 5-19/2 * * *"
  workflow_dispatch:
    inputs:
      send_test_message:
        description: "Send a Telegram connection test message"
        required: false
        default: false
        type: boolean
      send_existing_item:
        description: "Send the latest saved publication as a Telegram test"
        required: false
        default: false
        type: boolean
      verify_ai:
        description: "Verify GitHub Models without sending Telegram messages or changing state"
        required: false
        default: false
        type: boolean
      dry_run:
        description: "Run without Telegram delivery or state changes"
        required: false
        default: true
        type: boolean

concurrency:
  group: dividend-monitor
  cancel-in-progress: false

permissions:
  contents: write
  models: read

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
      models: read
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --requirement requirements-runtime.lock
          python -m pip install --no-deps --no-build-isolation -e .

      - name: Run monitor
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          AI_ENABLED: "true"
          AI_MODEL: openai/gpt-4o
          AI_BATCH_SIZE: "5"
          AI_FILTER_ENABLED: "false"
          AI_MIN_IMPORTANCE: low
          SEND_TEST_MESSAGE: ${{ inputs.send_test_message || false }}
          SEND_EXISTING_ITEM: ${{ inputs.send_existing_item || false }}
          VERIFY_AI: ${{ inputs.verify_ai || false }}
          DRY_RUN: ${{ inputs.dry_run || false }}
          WORKFLOW_NAME: ${{ github.workflow }}
        shell: bash
        run: |
          if [ "$VERIFY_AI" = "true" ]; then
            python -m dividend_monitor.github_models --verify
            exit 0
          fi
          args=()
          if [ "$SEND_EXISTING_ITEM" = "true" ]; then
            args+=(--send-existing-item)
          elif [ "$SEND_TEST_MESSAGE" = "true" ]; then
            args+=(--send-test-message --workflow-name "$WORKFLOW_NAME")
          fi
          if [ "$DRY_RUN" = "true" ]; then
            args+=(--dry-run)
          fi
          set -o pipefail
          python -m dividend_monitor.runner "${args[@]}" 2>&1 | tee monitor-output.txt

      - name: Check state changes
        id: state
        shell: bash
        run: |
          if git diff --quiet -- data/state.json; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit updated state
        if: steps.state.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/state.json
          git commit -m "chore: update monitor state"
          git push

      - name: Print run metrics
        if: always()
        run: |
          if [ -f monitor-output.txt ]; then
            grep -E '^(Duration|Sources|New publications|Telegram messages|Errors):' monitor-output.txt || true
          fi
